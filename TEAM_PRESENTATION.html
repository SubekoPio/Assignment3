<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduManage - Professional Team Presentation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            color: #333;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
            max-width: 1400px;
            width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }

        .slide-area {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .slide {
            display: none;
            padding: 50px 60px;
            height: 100%;
            animation: slideIn 0.6s ease-in-out;
            overflow-y: auto;
        }

        .slide.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Slide Types */
        .title-slide {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex !important;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .title-slide h1 {
            font-size: 56px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .title-slide .subtitle {
            font-size: 28px;
            margin-bottom: 30px;
            opacity: 0.95;
        }

        .title-slide .presenter {
            font-size: 18px;
            margin-top: 40px;
            background: rgba(255,255,255,0.2);
            padding: 15px 30px;
            border-radius: 50px;
        }

        .content-slide h2 {
            color: #667eea;
            font-size: 42px;
            margin-bottom: 30px;
            border-bottom: 4px solid #667eea;
            padding-bottom: 15px;
        }

        .content-slide h3 {
            color: #764ba2;
            font-size: 26px;
            margin-top: 25px;
            margin-bottom: 15px;
        }

        .content-slide p {
            font-size: 18px;
            line-height: 1.8;
            color: #555;
            margin-bottom: 15px;
        }

        .bullet-list {
            list-style: none;
            margin: 20px 0;
        }

        .bullet-list li {
            padding: 12px 0;
            padding-left: 40px;
            position: relative;
            font-size: 17px;
            color: #555;
            line-height: 1.6;
        }

        .bullet-list li:before {
            content: "▶";
            position: absolute;
            left: 0;
            color: #667eea;
            font-size: 16px;
        }

        .image-placeholder {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .image-placeholder p {
            color: #667eea;
            font-weight: bold;
            font-size: 16px;
            margin: 10px 0;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin: 20px 0;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }

        .card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 25px;
            border-radius: 10px;
            border-left: 5px solid #667eea;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h4 {
            color: #667eea;
            margin-bottom: 12px;
            font-size: 18px;
        }

        .card p {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
        }

        .highlight-box {
            background: #fff3cd;
            border-left: 5px solid #ffc107;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .highlight-box strong {
            color: #856404;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            margin: 15px 0;
        }

        .stat-box .number {
            font-size: 48px;
            font-weight: bold;
            display: block;
            margin: 10px 0;
        }

        .stat-box .label {
            font-size: 16px;
            opacity: 0.9;
        }

        .diagram-box {
            background: #f9f9f9;
            border: 2px solid #667eea;
            border-radius: 10px;
            padding: 25px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.8;
            overflow-x: auto;
            color: #333;
        }

        .mini-code {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #333;
            overflow-x: auto;
        }

        .part-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-top: 1px solid #ddd;
        }

        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .slide-indicator {
            display: flex;
            align-items: center;
            gap: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .progress-bar {
            width: 300px;
            height: 8px;
            background: #ddd;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin: 20px 0;
        }

        .timeline {
            position: relative;
            padding: 20px 0;
        }

        .timeline-item {
            padding: 20px;
            padding-left: 50px;
            position: relative;
            border-left: 3px solid #667eea;
            margin-bottom: 20px;
        }

        .timeline-item:before {
            content: "";
            position: absolute;
            left: -8px;
            top: 25px;
            width: 15px;
            height: 15px;
            background: #667eea;
            border-radius: 50%;
        }

        .timeline-item h4 {
            color: #667eea;
            margin-bottom: 8px;
        }

        .icon-text {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 15px 0;
            font-size: 16px;
        }

        .icon-text .icon {
            font-size: 32px;
            min-width: 50px;
        }

        .tree-diagram {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px 0;
        }

        .tree-node {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            min-width: 280px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            position: relative;
        }

        .tree-connector {
            width: 2px;
            height: 20px;
            background: #667eea;
            margin: 0;
        }

        .tree-children {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            width: 100%;
        }

        .tree-child {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tree-child-node {
            background: linear-gradient(135deg, #F39C12 0%, #E67E22 100%);
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            min-width: 180px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3);
        }

        .tree-child-attributes {
            background: #f9f9f9;
            color: #333;
            padding: 10px 15px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 13px;
            min-width: 180px;
            text-align: left;
            border: 1px solid #ddd;
        }

        .tree-child-attributes li {
            margin: 4px 0;
            padding-left: 15px;
        }

        .layer-stack {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .layer-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3);
            position: relative;
        }

        .layer-box.alt {
            background: linear-gradient(135deg, #F39C12 0%, #E67E22 100%);
            box-shadow: 0 6px 20px rgba(243, 156, 18, 0.3);
        }

        .layer-box .layer-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .layer-box .layer-description {
            font-size: 14px;
            opacity: 0.95;
        }

        .layer-arrow {
            text-align: center;
            font-size: 24px;
            color: #667eea;
            margin: 8px 0;
        }

        .entity-flow {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            padding: 20px;
        }

        .entity-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            min-width: 140px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .entity-arrow {
            font-size: 20px;
            color: #667eea;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .slide {
                padding: 30px 20px;
            }
            .grid-2, .grid-3, .two-column {
                grid-template-columns: 1fr;
            }
            .title-slide h1 {
                font-size: 36px;
            }
            .content-slide h2 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="slide-area" id="slideArea"></div>
        
        <div class="controls">

            {

                `

            {
                type: "content",
                title: "Core Data Models",
                content: `
                    <div class="grid-2">
                        <div class="card">
                            <h4>👤 Person (Base Class)</h4>
                            <p><strong>Attributes:</strong><br>
                            • person_id<br>
                            • name<br>
                            • email</p>
                        </div>
                        <div class="card">
                            <h4>🎓 Student (Inherits Person)</h4>
                            <p><strong>Attributes:</strong><br>
                            • enrolled_courses<br>
                            • units per course</p>
                        </div>
                        <div class="card">

                            <p><strong>Attributes:</strong><br>
                            • department<br>
                            • assigned_courses + taught_units</p>
                        </div>
                        <div class="card">

                            • course_id<br>

                content: `
                    <h3>Inheritance</h3>

                    <p>Private attributes with property decorators protect data integrity. Email validation example: invalid emails are automatically rejected.</p>

        let currentSlide = 0;

        function showSlide(n) {
            const slideArea = document.getElementById('slideArea');
            slideArea.innerHTML = '';

            if (n >= slides.length) currentSlide = slides.length - 1;
            if (n < 0) currentSlide = 0;

            const slide = slides[currentSlide];
            const slideDiv = document.createElement('div');
            slideDiv.className = `slide active ${slide.type}-slide`;

            if (slide.type === 'title') {
                slideDiv.innerHTML = `
                    <span class="part-badge">${slide.part}</span>
                    <h1>${slide.title}</h1>
                    <p class="subtitle">${slide.subtitle}</p>
                    <p class="presenter">${slide.presenter}</p>
                `;
            } else {
                slideDiv.innerHTML = `
                    <h2>${slide.title}</h2>
                    <div>${slide.content}</div>
                `;
            }

            slideArea.appendChild(slideDiv);

            document.getElementById('slideNum').textContent = currentSlide + 1;
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === slides.length - 1;
            
            const progress = ((currentSlide + 1) / slides.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function changeSlide(n) {
            currentSlide += n;
            showSlide(currentSlide);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeSlide(-1);
            if (e.key === 'ArrowRight') changeSlide(1);
        });

        showSlide(0);
    </script>
